<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maison Ali Menu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            display: flex;
            justify-content: center;
        }
        /* Kode baru agar gambar penuh ke samping dan bisa di-scroll ke bawah */
        img {
            width: 100%;
            max-width: 600px; /* Batas lebar maksimal agar tetap rapi di layar lebar */
            height: auto;
            display: block;
            pointer-events: none; /* Tetap mengunci foto agar tidak bisa di-download mudah */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <!-- Pastikan nama file di bawah ini sesuai dengan nama foto menu kamu di GitHub -->
    <img src="foto.jpg" alt="Maison Ali Menu">
</body>
</html>
